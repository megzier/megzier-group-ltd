<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="FreePDFEdit portfolio preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="45%" stop-color="#12243b"/>
      <stop offset="100%" stop-color="#2a1d09"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3d67c"/>
      <stop offset="55%" stop-color="#f1ab0a"/>
      <stop offset="100%" stop-color="#b8820a"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="110" r="210" fill="#f1ab0a" opacity="0.10"/>
  <circle cx="160" cy="780" r="280" fill="#2563eb" opacity="0.12"/>
  <circle cx="1120" cy="760" r="170" fill="#f3d67c" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="95" y="80" width="1410" height="740" rx="28" fill="url(#panel)"/>
    <rect x="95" y="80" width="1410" height="84" rx="28" fill="#0f172a"/>
    <circle cx="150" cy="122" r="8" fill="#f87171"/>
    <circle cx="178" cy="122" r="8" fill="#facc15"/>
    <circle cx="206" cy="122" r="8" fill="#34d399"/>
    <text x="250" y="131" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">FreePDFEdit</text>
    <text x="250" y="160" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#9ca3af">Browser-based PDF editor and signer</text>
    <rect x="1140" y="108" width="290" height="36" rx="18" fill="#1f2937"/>
    <text x="1284" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#f3d67c">Edit / Sign / Annotate</text>

    <text x="160" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#f8fafc">FreePDFEdit</text>
    <text x="160" y="338" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#d1d5db">Edit PDF text, sign files and highlight important sections.</text>

    <g>
      <rect x="160" y="390" width="150" height="50" rx="25" fill="#0f172a"/>
      <text x="235" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Text Edit</text>
      <rect x="322" y="390" width="126" height="50" rx="25" fill="#f8fafc" stroke="#d1d5db"/>
      <text x="385" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Sign</text>
      <rect x="460" y="390" width="168" height="50" rx="25" fill="#f8fafc" stroke="#d1d5db"/>
      <text x="544" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Highlight</text>
      <rect x="640" y="390" width="176" height="50" rx="25" fill="#f8fafc" stroke="#d1d5db"/>
      <text x="728" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Annotations</text>
    </g>

    <rect x="160" y="500" width="540" height="248" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="190" y="530" width="260" height="18" rx="9" fill="#e5e7eb"/>
    <rect x="190" y="566" width="385" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="190" y="596" width="345" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="190" y="626" width="305" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="190" y="668" width="150" height="18" rx="9" fill="url(#gold)" opacity="0.9"/>
    <rect x="190" y="700" width="220" height="8" rx="4" fill="#1f2937" opacity="0.85"/>
    <rect x="190" y="716" width="180" height="8" rx="4" fill="#1f2937" opacity="0.85"/>
    <path d="M560 666 C592 626, 615 746, 650 676 C670 636, 705 686, 730 650" fill="none" stroke="#b8820a" stroke-width="5" stroke-linecap="round"/>

    <rect x="760" y="500" width="580" height="248" rx="22" fill="url(#ink)" stroke="#d1d5db"/>
    <rect x="792" y="532" width="130" height="28" rx="14" fill="#f59e0b"/>
    <text x="857" y="551" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">Invoice.pdf</text>
    <rect x="792" y="584" width="280" height="16" rx="8" fill="#334155"/>
    <rect x="792" y="616" width="340" height="16" rx="8" fill="#475569"/>
    <rect x="792" y="648" width="310" height="16" rx="8" fill="#334155"/>
    <rect x="792" y="680" width="250" height="16" rx="8" fill="#475569"/>
    <rect x="1110" y="582" width="182" height="90" rx="18" fill="#f8fafc"/>
    <text x="1201" y="624" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#0f172a">Signed</text>
    <path d="M1130 650 Q1160 620 1190 644 T1250 638 T1280 650" fill="none" stroke="#b8820a" stroke-width="4" stroke-linecap="round"/>
    <text x="1110" y="728" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#cbd5e1">Fast workflow for document updates, signing and download.</text>
  </g>
</svg>
