<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="MegzierAI portfolio preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="240" cy="140" r="190" fill="#22d3ee" opacity="0.10"/>
  <circle cx="1360" cy="790" r="260" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="1180" cy="140" r="150" fill="#ec4899" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="90" y="72" width="1420" height="756" rx="30" fill="url(#panel)"/>
    <rect x="90" y="72" width="1420" height="84" rx="30" fill="#020617"/>
    <circle cx="145" cy="114" r="8" fill="#f87171"/>
    <circle cx="173" cy="114" r="8" fill="#facc15"/>
    <circle cx="201" cy="114" r="8" fill="#34d399"/>
    <text x="248" y="123" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#e5e7eb">MegzierAI</text>
    <text x="248" y="152" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#94a3b8">AI text humanizer and writing workflow</text>
    <rect x="1110" y="108" width="320" height="36" rx="18" fill="#1e293b"/>
    <text x="1270" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#67e8f9">Humanize text for natural output</text>

    <text x="160" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" fill="#f8fafc">MegzierAI</text>
    <text x="160" y="338" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#d1d5db">AI text humanizer built for fast, natural rewriting.</text>

    <g>
      <rect x="160" y="390" width="132" height="50" rx="25" fill="url(#accent)"/>
      <text x="226" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Natural</text>
      <rect x="304" y="390" width="140" height="50" rx="25" fill="#f8fafc" stroke="#d1d5db"/>
      <text x="374" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Fast</text>
      <rect x="456" y="390" width="156" height="50" rx="25" fill="#f8fafc" stroke="#d1d5db"/>
      <text x="534" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Clean</text>
      <rect x="624" y="390" width="170" height="50" rx="25" fill="url(#pink)"/>
      <text x="709" y="423" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Humanize</text>
    </g>

    <rect x="160" y="500" width="600" height="262" rx="24" fill="#0f172a" stroke="#334155"/>
    <text x="194" y="542" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#67e8f9">INPUT</text>
    <rect x="194" y="566" width="520" height="18" rx="9" fill="#334155"/>
    <rect x="194" y="598" width="430" height="18" rx="9" fill="#334155"/>
    <rect x="194" y="630" width="480" height="18" rx="9" fill="#334155"/>
    <rect x="194" y="678" width="170" height="20" rx="10" fill="#0ea5e9"/>
    <text x="279" y="693" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">AI TEXT</text>
    <rect x="392" y="678" width="160" height="20" rx="10" fill="#8b5cf6"/>
    <text x="472" y="693" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">POLISH</text>
    <rect x="576" y="678" width="116" height="20" rx="10" fill="#ec4899"/>
    <text x="634" y="693" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">TONE</text>

    <rect x="806" y="500" width="604" height="262" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="840" y="542" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">OUTPUT</text>
    <rect x="840" y="566" width="454" height="18" rx="9" fill="#dbeafe"/>
    <rect x="840" y="598" width="510" height="18" rx="9" fill="#bfdbfe"/>
    <rect x="840" y="630" width="470" height="18" rx="9" fill="#dbeafe"/>
    <rect x="840" y="678" width="128" height="20" rx="10" fill="#22c55e"/>
    <text x="904" y="693" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">NATURAL</text>
    <rect x="990" y="678" width="160" height="20" rx="10" fill="#0ea5e9"/>
    <text x="1070" y="693" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">CLEAN</text>
    <rect x="1170" y="678" width="130" height="20" rx="10" fill="#f59e0b"/>
    <text x="1235" y="693" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#111827">READY</text>
  </g>
</svg>
